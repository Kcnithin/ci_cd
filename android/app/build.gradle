plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.cicd.seeroo_sample"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.cicd.seeroo_sample"

        // MUST MATCH your first uploaded internal build
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion

        // Flutter automatically injects versionCode/versionName,
        // and your CI/CD overrides versionCode via --build-number
        versionCode flutter.versionCode
        versionName flutter.versionName

        // ABI filters must remain EXACTLY like your old AAB:
        // arm64-v8a, armeabi-v7a, x86_64
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        release {
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']

            // Fallbacks for CI/CD
            if (storeFile == null) {
                def envStorePath = System.getenv("ANDROID_KEYSTORE_PATH")
                if (envStorePath != null) {
                    storeFile = file(envStorePath)
                }
            }
            if (storePassword == null) {
                storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
            }
            if (keyAlias == null) {
                keyAlias = System.getenv("ANDROID_KEY_ALIAS")
            }
            if (keyPassword == null) {
                keyPassword = System.getenv("ANDROID_KEY_ALIAS_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled true
            shrinkResources true
        }
    }
}

flutter {
    source = "../.."
}