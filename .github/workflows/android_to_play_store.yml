name: Android — Build & Upload to Play Store

on:
  workflow_dispatch:
    inputs:
      dart_define:
        description: "Optional --dart-define key=value (comma-separated)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: play-internal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: windows-latest

    env:
      # <-- IMPORTANT: set to your real package name in Play Console
      PACKAGE_NAME: com.cicd.seeroo_sample

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------
      # Java (Temurin 17)
      # ---------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: 'gradle'

      # ---------------------------
      # Flutter SDK (with cache)
      # ---------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.9"
          cache: true

      # ---------------------------
      # Cache Pub (Dart packages)
      # ---------------------------
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ---------------------------
      # Flutter prep
      # ---------------------------
      - name: Flutter Clean & Pub Get
        run: |
          flutter clean
          flutter pub get
        env:
          PUB_CACHE: ${{ env.PUB_CACHE }}

      # ---------------------------
      # Read versionName from pubspec.yaml (informational)
      # ---------------------------
      - name: Read version from pubspec.yaml
        id: read_ver
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml | head -n 1 | awk '{print $2}')
          echo "APP_VERSION=$VERSION_LINE" >> $GITHUB_ENV
          echo "Detected versionName: $VERSION_LINE"

      # ---------------------------
      # Compute monotonically increasing versionCode
      # (Use GitHub run number to ensure it's always higher than any prior upload)
      # ---------------------------
      - name: Compute VERSION_CODE
        run: echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      # ---------------------------
      # Decode keystore (THIS one should be Base64)
      # ---------------------------
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystores
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystores/upload-keystore.jks

      # ---------------------------
      # Create key.properties
      # ---------------------------
      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=../keystores/upload-keystore.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      # ---------------------------
      # (Optional) Verify ABI settings are present in Gradle
      # ---------------------------
      - name: Show Gradle defaultConfig (sanity)
        run: |
          echo "Expecting minSdkVersion 24 and abiFilters for armeabi-v7a, arm64-v8a, x86_64"
          grep -n "minSdkVersion" android/app/build.gradle || true
          grep -n "abiFilters"   android/app/build.gradle || true

      # ---------------------------
      # Build AAB
      # IMPORTANT: force all target platforms to match your first uploaded build
      # ---------------------------
      - name: Build Release AAB
        env:
          DART_DEFINE: ${{ inputs.dart_define }}
          PUB_CACHE: ${{ env.PUB_CACHE }}
        run: |
          EXTRA=""
          if [ -n "${DART_DEFINE}" ]; then
            IFS=',' read -ra KV <<< "${DART_DEFINE}"
            for item in "${KV[@]}"; do
              if [ -n "$item" ]; then
                EXTRA="$EXTRA --dart-define=$item"
              fi
            done
          fi

          echo "Using versionName=${APP_VERSION} and versionCode=${VERSION_CODE}"
          flutter build appbundle \
            --release \
            --build-number ${VERSION_CODE} \
            --target-platform android-arm,android-arm64,android-x64 \
            ${EXTRA}

      # ---------------------------
      # Upload artifact (optional but helpful)
      # ---------------------------
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # ---------------------------
      # Upload to Play Store (Internal track)
      # NOTE: serviceAccountJsonPlainText expects PLAIN JSON (no Base64)
      # ---------------------------
      - name: Upload to Play Console (Internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
